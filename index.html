<!DOCTYPE html>
<html>
<head>
<title>ぼくの野球ゲーム</title>
</head>

<body>

<h1>⚾ぼくの野球ゲーム⚾</h1>

<button onclick="swing()">
バットをふる！
</button>

<p id="result">
ボタンを押してね！
</p>

<script>

function swing() {

  let number = Math.random();

  if(number < 0.3){
    document.getElementById("result").innerText =
      "ホームラン！！";
  }

  else if(number < 0.7){
    document.getElementById("result").innerText =
      "ヒット！";
  }

  else{
    document.getElementById("result").innerText =
      "空振り！";
  }

}

</script>

</body>
</html>
