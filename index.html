<!DOCTYPE html>
<html>
<head>
  <title>ぼくの野球ゲーム</title>
</head>

<body>

  <h1>⚾ぼくの野球ゲーム⚾</h1>

  <p id="score">
    得点：0
  </p>

  <p id="bases">
    読み込み中...
  </p>

  <button onclick="swing()">
    バットをふる！
  </button>

  <p id="result">
    ボタンを押してね！
  </p>

  <script>

<script>

let score = 0;

let runner1 = false;
let runner2 = false;
let runner3 = false;

function showBases() {

  let first = runner1 ? "🟢" : "⚪";
  let second = runner2 ? "🟢" : "⚪";
  let third = runner3 ? "🟢" : "⚪";

  document.getElementById("bases").innerHTML =
    "&nbsp;&nbsp;&nbsp;&nbsp;" + second + "<br>" +
    third + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" + first + "<br>" +
    "&nbsp;&nbsp;&nbsp;&nbsp;🏠";
}

function hit() {

  // 3塁ランナーがいたら得点
  if (runner3) {
    score++;
  }

  // ランナーを進める
  runner3 = runner2;
  runner2 = runner1;
  runner1 = true;

  document.getElementById("score").innerText =
    "得点：" + score;

  showBases();

  document.getElementById("result").innerText =
    "ヒット！";
}

function homerun() {

  let runs = 1; // バッター

  if (runner1) runs++;
  if (runner2) runs++;
  if (runner3) runs++;

  score += runs;

  runner1 = false;
  runner2 = false;
  runner3 = false;

  document.getElementById("score").innerText =
    "得点：" + score;

  showBases();

  document.getElementById("result").innerText =
    runs + "ランホームラン！！";
}

function swing() {

  let number = Math.random();

  if (number < 0.3) {

    homerun();

  }
  else if (number < 0.7) {

    hit();

  }
  else {

    document.getElementById("result").innerText =
      "空振り！";

  }

}

showBases();

</script>
  </script>

</body>
</html>
