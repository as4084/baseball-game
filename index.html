<!DOCTYPE html>
<html>
<head>
<title>ぼくの野球ゲーム</title>
</head>

<body>

<h1>⚾ぼくの野球ゲーム⚾</h1>

<p id="score">
得点：0
</p>
  
<button onclick="swing()">

バットをふる！
  
</button>

<p id="result">
ボタンを押してね！
</p>

<script>

let score = 0;

function swing() {

  let number = Math.random();

if(number < 0.3){

  score = score + 1;

  document.getElementById("score").innerText =
    "得点：" + score;

  document.getElementById("result").innerText =
    "ホームラン！！";
}

  else if(number < 0.7){

  score = score + 1;

  document.getElementById("score").innerText =
    "得点：" + score;

  document.getElementById("result").innerText =
    "ヒット！";
}

  else{
    document.getElementById("result").innerText =
      "空振り！";
  }

}

</script>

</body>
</html>
